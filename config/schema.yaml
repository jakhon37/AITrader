# Config schema reference (for documentation).
# Actual validation is in src/config.py (Pydantic).
# Do not put secrets here.

env: dev  # dev | staging | prod

data:
  symbols:
    - EUR_USD
    - GBP_USD
    - USD_JPY
  lookback_days: 1825  # 5 years
  data_dir: data
  data_version: null

model:
  checkpoint_dir: checkpoints
  ensemble_weights: {}
  confidence_threshold: 0.55
  # Model types: lightgbm, xgboost, enhanced_transformer, lstm_transformer, garch_gru
  model_type: lstm_transformer
  # Neural net params
  epochs: 50
  batch_size: 256
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  learning_rate: 0.001
  seq_length: 20
  # Enhanced transformer params
  d_model: 256
  nhead: 8
  num_transformer_layers: 4
  dim_feedforward: 1024
  # Tree-based params
  n_estimators: 500
  max_depth: 7
  tree_learning_rate: 0.01
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1

risk:
  max_position_pct: 0.02
  max_drawdown_pct: 0.10
  daily_loss_limit_pct: 0.03
  max_signals_per_day: 50

execution:
  broker: mock
  slippage_pips: 0.5
  rate_limit_per_min: 30

fundamental:
  sentiment_backend: mock   # finbert | mock | openrouter
  poll_interval_seconds: 600
  aggregation_window_minutes: 15
  min_confidence_to_emit: 0.25
  enable_structured_llm: true
  calendar_briefing_enabled: true
  calendar_min_impact: medium
  calendar_telegram_min_impact: high
