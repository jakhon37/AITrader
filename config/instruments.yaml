XAUUSD:
  pip_size: 0.01
  lot_size: 100          # 1 lot = 100 oz
  session_hours:
    open: "22:00"
    close: "21:59"       # Gold follows commodities session; close slightly before FX weekly close
  active_timeframes: ["15m", "1h", "4h", "1d"]
  primary_timeframe: "1h"
  fundamental_weight: 0.5   # Gold is more macro-driven than FX pairs
  technical_weight: 0.5
  max_position_lots: 0.5    # smaller due to larger lot value
  news_halt_minutes: 45     # Gold is more volatile around CPI/NFP
  signal_decay:
    central_bank: 72        # rate decisions move Gold for longer
    economic_data: 6
    geopolitical: 12        # geopolitical premium lingers in Gold
    market_risk: 4
    technical_conf: 1
