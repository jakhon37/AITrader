env: prod

data:
  symbols:
    - EUR_USD
    - GBP_USD
    - USD_JPY
  lookback_days: 1825
  data_dir: data
  data_version: null

model:
  checkpoint_dir: checkpoints
  ensemble_weights: {}
  confidence_threshold: 0.55

risk:
  max_position_pct: 0.02
  max_drawdown_pct: 0.10
  daily_loss_limit_pct: 0.03
  max_signals_per_day: 50

execution:
  broker: oanda
  slippage_pips: 0.5
  rate_limit_per_min: 30
