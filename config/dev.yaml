env: dev

data:
  # Legacy training-script symbol list (fallback when instruments.yaml unavailable).
  # Enabled instruments + trading params: config/instruments.yaml
  symbols:
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - XAUUSD
  lookback_days: 365
  data_dir: data
  data_version: null
  # Supported timeframes: 1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w, 1mo
  timeframe: "1m"
  source: dukascopy
  pipeline:
    tail_days: 14
    full_lookback_days: 1825
    live_poll_adaptive: true
    live_poll_sec_m1: 60
    live_poll_sec_focused: 2.0
    live_poll_sec_background: 10.0
    auto_refresh: true
    tail_refresh_interval_sec: 3600
    tail_resample_slow_interval_sec: 86400
    live_m1_cache_ttl_sec: 30.0
    dukascopy_tick_enabled: true

model:
  checkpoint_dir: checkpoints
  ensemble_weights: {}
  confidence_threshold: 0.055
  
  # Available models: lightgbm, xgboost, enhanced_transformer, lstm_transformer, garch_gru
  # Recommended: lightgbm (fastest, accurate), xgboost (robust), enhanced_transformer (best accuracy)
  model_type: "lstm_transformer"
  
  # Common parameters
  epochs: 50              # Training epochs (neural nets only)
  batch_size: 256         # Batch size (neural nets only, GPU-optimized for RTX 4080)
  
  # Neural Network Parameters (lstm_transformer, garch_gru)
  hidden_size: 128        # Hidden dimension for LSTM/GRU
  num_layers: 2           # Number of LSTM/GRU layers
  dropout: 0.2            # Dropout rate for regularization
  learning_rate: 0.001    # Learning rate for optimizer
  seq_length: 20          # Sequence length (timesteps to look back)
  
  # Enhanced Transformer Parameters (enhanced_transformer)
  d_model: 256            # Model dimension (larger = more capacity)
  nhead: 8                # Number of attention heads (must divide d_model)
  num_transformer_layers: 4  # Number of transformer encoder layers
  dim_feedforward: 1024   # Feedforward network dimension
  
  # Tree-based Model Parameters (lightgbm, xgboost)
  n_estimators: 500       # Number of boosting rounds/trees
  max_depth: 7            # Maximum tree depth
  tree_learning_rate: 0.01  # Learning rate for boosting (lower = slower but more robust)
  subsample: 0.8          # Row sampling ratio per iteration
  colsample_bytree: 0.8   # Column sampling ratio per tree
  reg_alpha: 0.1          # L1 regularization term
  reg_lambda: 0.1         # L2 regularization term

risk:
  max_position_pct: 0.102
  max_drawdown_pct: 0.215
  daily_loss_limit_pct: 0.20
  max_signals_per_day: 500

execution:
  broker: mock
  slippage_pips: 0.5
  rate_limit_per_min: 30

notifier:
  telegram:
    # Relaxed for dev/testing — you will now receive neutral signals too.
    # For production tighten: min_confidence 0.5+, directions only ["long","short"]
    trade_signal:
      enabled: true
      min_confidence: 0.0
      directions: ["long", "short", "neutral"]
    fundamental_signal:
      enabled: true
      min_strength: "weak"
    order_event:
      enabled: true
      event_types: ["filled", "rejected"]
    system_health:
      enabled: true
      min_status: "degraded"   # heartbeats update /status cache; Telegram only on issues

fundamental:
  # On Intel 16GB Mac dev machines, prefer "mock" or "openrouter" to avoid heavy FinBERT RAM/CPU usage.
  # Use "finbert" on GPU machines or when you want fully local high-quality scoring.
  sentiment_backend: "openrouter"   # finbert | mock | openrouter
  poll_interval_seconds: 600
  aggregation_window_minutes: 15
  min_confidence_to_emit: 0.15
  enable_structured_llm: true
  calendar_briefing_enabled: true
  calendar_min_impact: "medium"       # low | medium | high
  calendar_telegram_min_impact: "medium"
  dev_bootstrap_signals: true
