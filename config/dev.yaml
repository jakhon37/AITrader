env: dev

data:
  # First symbol is used as default for training scripts
  symbols:
    - BTC_USD
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - GOLD
  lookback_days: 365
  data_dir: data
  data_version: null
  # Supported timeframes: 1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w, 1mo
  timeframe: "1m"

model:
  checkpoint_dir: checkpoints
  ensemble_weights: {}
  confidence_threshold: 0.055
  # Available models: lstm_transformer, garch_gru
  model_type: "lstm_transformer"
  # Optimized for GPU (RTX 4080: use 256-512)
  batch_size: 256
  # Default training epochs
  epochs: 50

risk:
  max_position_pct: 0.102
  max_drawdown_pct: 0.215
  daily_loss_limit_pct: 0.205
  max_signals_per_day: 500

execution:
  broker: mock
  slippage_pips: 0.5
  rate_limit_per_min: 30
